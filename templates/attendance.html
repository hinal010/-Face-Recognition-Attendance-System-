<!DOCTYPE html>
<html>
<head>
    <title>Start Attendance</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<a href="/" class="back-btn">
    ← Back to Dashboard
</a>

<div class="main-layout">

    <div class="form-panel">
        <h2>Live Attendance</h2>

        <button onclick="startAttendance()">Start Attendance</button>
        <button onclick="stopAttendance()" class="danger">Stop Attendance</button>

        <div class="info-box">
            <p><b>ID:</b> <span id="personId">-</span></p>
            <p><b>Name:</b> <span id="fullName">-</span></p>
            <p><b>Department:</b> <span id="department">-</span></p>
            <p><b>Status:</b> <span id="status">Waiting...</span></p>
            <p><b>Date:</b> <span id="date">-</span></p>
            <p><b>In Time:</b> <span id="inTime">-</span></p>
            <p><b>Out Time:</b> <span id="outTime">-</span></p>
        </div>

        <p id="message"></p>
    </div>

    <div class="camera-panel">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const message = document.getElementById("message");
const overlayCanvas = document.getElementById("overlayCanvas");
const overlayContext = overlayCanvas.getContext("2d");

let attendanceRunning = false;
let intervalId = null;

navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream;
    })
    .catch(() => {
        message.innerText = "Camera access denied.";
        message.style.color = "red";
    });

function captureFrame() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const context = canvas.getContext("2d");
    context.drawImage(video, 0, 0, canvas.width, canvas.height);

    return canvas.toDataURL("image/jpeg");
}

function drawFaceBox(box, status) {
    overlayCanvas.width = video.clientWidth;
    overlayCanvas.height = video.clientHeight;

    overlayContext.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    if (!box) return;

    const scaleX = overlayCanvas.width / box.image_width;
    const scaleY = overlayCanvas.height / box.image_height;

    const x = box.left * scaleX;
    const y = box.top * scaleY;
    const w = (box.right - box.left) * scaleX;
    const h = (box.bottom - box.top) * scaleY;

    const successStatuses = ["in_marked", "out_marked", "already_in", "completed"];
    overlayContext.strokeStyle = successStatuses.includes(status) ? "#22c55e" : "#ef4444";
    overlayContext.lineWidth = 4;
    overlayContext.strokeRect(x, y, w, h);
}

function clearPersonDetails() {
    document.getElementById("personId").innerText = "-";
    document.getElementById("fullName").innerText = "-";
    document.getElementById("department").innerText = "-";
    document.getElementById("date").innerText = "-";
    document.getElementById("inTime").innerText = "-";
    document.getElementById("outTime").innerText = "-";
}

function startAttendance() {
    if (attendanceRunning) return;

    attendanceRunning = true;
    message.innerText = "Attendance started.";
    message.style.color = "#2563eb";
    document.getElementById("status").innerText = "Recognizing...";

    markAttendance();
    intervalId = setInterval(markAttendance, 3000);
}

function stopAttendance() {
    attendanceRunning = false;

    if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
    }

    overlayContext.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    document.getElementById("status").innerText = "Stopped";
    message.innerText = "Attendance stopped.";
    message.style.color = "red";
}

async function markAttendance() {
    if (!attendanceRunning) return;

    if (!video.videoWidth || !video.videoHeight) {
        message.innerText = "Camera loading...";
        message.style.color = "#2563eb";
        return;
    }

    const imageData = captureFrame();

    const formData = new FormData();
    formData.append("image_data", imageData);

    try {
        const response = await fetch("/mark-attendance", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        drawFaceBox(result.box, result.status);
        document.getElementById("status").innerText = result.message || result.status;

        if (result.person_id) {
            document.getElementById("personId").innerText = result.person_id;
            document.getElementById("fullName").innerText = result.full_name;
            document.getElementById("department").innerText = result.department;
            document.getElementById("date").innerText = result.date;
            document.getElementById("inTime").innerText = result.in_time || "-";
            document.getElementById("outTime").innerText = result.out_time || "-";
        }

        if (result.status === "waiting") {
            clearPersonDetails();
            message.innerText = "Place your face in the camera.";
            message.style.color = "#2563eb";
        }
        else if (result.status === "multiple") {
            clearPersonDetails();
            message.innerText = "Only one face should be visible.";
            message.style.color = "red";
        }
        else if (result.status === "in_marked") {
            message.innerText = "In Time marked successfully.";
            message.style.color = "green";
        }
        else if (result.status === "already_in") {
            message.innerText = result.message;
            message.style.color = "#f59e0b";
        }
        else if (result.status === "out_marked") {
            message.innerText = "Out Time marked successfully.";
            message.style.color = "#2563eb";
        }
        else if (result.status === "completed") {
            message.innerText = "Attendance already completed today.";
            message.style.color = "#6b7280";
        }
        else if (result.status === "unknown") {
            clearPersonDetails();
            message.innerText = "Unknown person.";
            message.style.color = "red";
        }
        else {
            message.innerText = result.message;
            message.style.color = "#2563eb";
        }
    }
    catch (error) {
        console.error(error);
        message.innerText = "Something went wrong.";
        message.style.color = "red";
    }
}
</script>

</body>
</html>
